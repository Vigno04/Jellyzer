name: Develop Channel

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: develop-channel
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-dev:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Jellyzer/Jellyzer.csproj

      - name: Build
        run: dotnet build Jellyzer/Jellyzer.csproj -c Release --no-restore

      - name: Package develop assets
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BASE_VERSION="$(awk -F '"' '/^version:/ { print $2; exit }' build.yaml)"
          BRANCH_NAME="${GITHUB_REF_NAME}"

          if [[ -z "${BASE_VERSION}" ]]; then
            echo "Could not read version from build.yaml"
            exit 1
          fi

          if [[ "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            DEV_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          elif [[ "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            DEV_VERSION="$(echo "${BASE_VERSION}" | awk -F. -v run="${GITHUB_RUN_NUMBER}" '{ print $1 "." $2 "." $3 "." run }')"
          else
            echo "Unsupported version format in build.yaml: ${BASE_VERSION}"
            exit 1
          fi

          mkdir -p artifacts/Jellyzer
          cp Jellyzer/bin/Release/net9.0/Jellyzer.dll artifacts/Jellyzer/

          jq --arg version "${DEV_VERSION}" --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --arg sha "${SHORT_SHA}" \
            '.version = $version | .timestamp = $ts | .changelog = ("- Develop build " + $sha)' \
            Jellyzer/meta.json > artifacts/Jellyzer/meta.json

          if [ -f Jellyzer/logo.png ]; then
            cp Jellyzer/logo.png artifacts/Jellyzer/
          fi

          ZIP_NAME="jellyzer-develop-${SHORT_SHA}.zip"

          (cd artifacts && zip -r "${ZIP_NAME}" Jellyzer)
          (cd artifacts && md5sum "${ZIP_NAME}" > "${ZIP_NAME%.zip}.md5")

          if [[ "${BRANCH_NAME}" == "main" ]]; then
            REPOSITORY_FILE="repository.json"
            PUBLISHED_ZIP="jellyzer-main-latest.zip"
            PUBLISHED_MD5="jellyzer-main-latest.md5"
          else
            REPOSITORY_FILE="repository-dev.json"
            PUBLISHED_ZIP="jellyzer-develop-latest.zip"
            PUBLISHED_MD5="jellyzer-develop-latest.md5"
          fi

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "DEV_VERSION=${DEV_VERSION}" >> $GITHUB_ENV
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          echo "REPOSITORY_FILE=${REPOSITORY_FILE}" >> $GITHUB_ENV
          echo "PUBLISHED_ZIP=${PUBLISHED_ZIP}" >> $GITHUB_ENV
          echo "PUBLISHED_MD5=${PUBLISHED_MD5}" >> $GITHUB_ENV

      - name: Publish develop repository manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch --no-tags origin "refs/heads/${BRANCH_NAME}:refs/remotes/origin/${BRANCH_NAME}"
          git tag -d "${BRANCH_NAME}" || true
          git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"

          mkdir -p packages
          cp "artifacts/${ZIP_NAME}" "packages/${PUBLISHED_ZIP}"
          cp "artifacts/${ZIP_NAME%.zip}.md5" "packages/${PUBLISHED_MD5}"

          CHECKSUM="$(awk '{print $1}' "packages/${PUBLISHED_MD5}")"
          SOURCE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/refs/heads/${BRANCH_NAME}/packages/${PUBLISHED_ZIP}"
          IMAGE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/refs/heads/${BRANCH_NAME}/Jellyzer/logo.png"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          NAME="$(jq -r '.name' Jellyzer/meta.json)"
          GUID="$(jq -r '.guid' Jellyzer/meta.json | tr '[:lower:]' '[:upper:]')"
          OVERVIEW="$(jq -r '.overview' Jellyzer/meta.json)"
          DESCRIPTION="$(jq -r '.description' Jellyzer/meta.json)"
          OWNER="$(jq -r '.owner' Jellyzer/meta.json)"
          CATEGORY="$(jq -r '.category' Jellyzer/meta.json)"
          TARGET_ABI="$(jq -r '.targetAbi' Jellyzer/meta.json)"

          jq -n \
            --arg name "${NAME}" \
            --arg guid "${GUID}" \
            --arg overview "${OVERVIEW}" \
            --arg description "${DESCRIPTION}" \
            --arg owner "${OWNER}" \
            --arg category "${CATEGORY}" \
            --arg targetAbi "${TARGET_ABI}" \
            --arg version "${DEV_VERSION}" \
            --arg timestamp "${TIMESTAMP}" \
            --arg checksum "${CHECKSUM}" \
            --arg sourceUrl "${SOURCE_URL}" \
            --arg imageUrl "${IMAGE_URL}" \
            --arg changelog "Rolling develop build from ${GITHUB_SHA}" \
            '[{
              name: $name,
              guid: $guid,
              overview: $overview,
              description: $description,
              owner: $owner,
              category: $category,
              imageUrl: $imageUrl,
              versions: [{
                version: $version,
                targetAbi: $targetAbi,
                sourceUrl: $sourceUrl,
                checksum: $checksum,
                timestamp: $timestamp,
                changelog: $changelog
              }]
            }]' > "${REPOSITORY_FILE}"

          git add "${REPOSITORY_FILE}" "packages/${PUBLISHED_ZIP}" "packages/${PUBLISHED_MD5}"
          if ! git diff --cached --quiet; then
            git commit -m "ci: update ${REPOSITORY_FILE} for ${SHORT_SHA} [skip ci]"
            git push origin "HEAD:refs/heads/${BRANCH_NAME}"
          else
            echo "${REPOSITORY_FILE} already up-to-date."
          fi
