name: Publish Plugin Manifests

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: publish-plugin-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-main:
    if: github.actor != 'github-actions[bot]' && github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Jellyzer/Jellyzer.csproj

      - name: Build
        run: dotnet build Jellyzer/Jellyzer.csproj -c Release --no-restore

      - name: Package stable assets
        run: |
          BASE_VERSION="$(awk -F '"' '/^version:/ { print $2; exit }' build.yaml)"

          if [[ "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            STABLE_VERSION="${BASE_VERSION}.0"
          elif [[ "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            STABLE_VERSION="${BASE_VERSION}"
          else
            echo "Unsupported version format in build.yaml: ${BASE_VERSION}"
            exit 1
          fi

          mkdir -p artifacts/package
          cp Jellyzer/bin/Release/net9.0/Jellyzer.dll artifacts/package/

          jq --arg version "${STABLE_VERSION}" --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '.version = $version | .timestamp = $ts' \
            Jellyzer/meta.json > artifacts/package/meta.json

          if [ -f Jellyzer/logo.png ]; then
            cp Jellyzer/logo.png artifacts/package/
          fi

          (cd artifacts/package && zip -r ../jellyzer-main-latest.zip .)
          (cd artifacts && md5sum jellyzer-main-latest.zip > jellyzer-main-latest.md5)

          CHECKSUM="$(awk '{print $1}' artifacts/jellyzer-main-latest.md5)"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          NAME="$(jq -r '.name' Jellyzer/meta.json)"
          GUID="$(jq -r '.guid' Jellyzer/meta.json | tr '[:lower:]' '[:upper:]')"
          OVERVIEW="$(jq -r '.overview' Jellyzer/meta.json)"
          DESCRIPTION="$(jq -r '.description' Jellyzer/meta.json)"
          OWNER="$(jq -r '.owner' Jellyzer/meta.json)"
          CATEGORY="$(jq -r '.category' Jellyzer/meta.json)"
          TARGET_ABI="$(jq -r '.targetAbi' Jellyzer/meta.json)"
          CHANGELOG="$(awk '/^changelog:/ {getline; sub(/^  /, ""); print; exit}' build.yaml)"

          SOURCE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/refs/heads/main/packages/jellyzer-main-latest.zip"
          IMAGE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/refs/heads/main/Jellyzer/logo.png"

          jq -n \
            --arg name "${NAME}" \
            --arg guid "${GUID}" \
            --arg overview "${OVERVIEW}" \
            --arg description "${DESCRIPTION}" \
            --arg owner "${OWNER}" \
            --arg category "${CATEGORY}" \
            --arg targetAbi "${TARGET_ABI}" \
            --arg version "${STABLE_VERSION}" \
            --arg timestamp "${TIMESTAMP}" \
            --arg checksum "${CHECKSUM}" \
            --arg sourceUrl "${SOURCE_URL}" \
            --arg imageUrl "${IMAGE_URL}" \
            --arg changelog "${CHANGELOG}" \
            '[{
              name: $name,
              guid: $guid,
              overview: $overview,
              description: $description,
              owner: $owner,
              category: $category,
              imageUrl: $imageUrl,
              versions: [{
                version: $version,
                targetAbi: $targetAbi,
                sourceUrl: $sourceUrl,
                checksum: $checksum,
                timestamp: $timestamp,
                changelog: $changelog
              }]
            }]' > repository.json

      - name: Commit published main artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p packages
          cp artifacts/jellyzer-main-latest.zip packages/jellyzer-main-latest.zip
          cp artifacts/jellyzer-main-latest.md5 packages/jellyzer-main-latest.md5

          git add repository.json packages/jellyzer-main-latest.zip packages/jellyzer-main-latest.md5
          if ! git diff --cached --quiet; then
            git commit -m "ci: update stable repository manifest [skip ci]"
            git push origin HEAD:main
          else
            echo "Stable files already up-to-date."
          fi

  publish-develop:
    if: github.actor != 'github-actions[bot]' && github.ref_name == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Jellyzer/Jellyzer.csproj

      - name: Build
        run: dotnet build Jellyzer/Jellyzer.csproj -c Release --no-restore

      - name: Package develop assets
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BASE_VERSION="$(awk -F '"' '/^version:/ { print $2; exit }' build.yaml)"

          if [[ "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            DEV_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          elif [[ "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            DEV_VERSION="$(echo "${BASE_VERSION}" | awk -F. -v run="${GITHUB_RUN_NUMBER}" '{ print $1 "." $2 "." $3 "." run }')"
          else
            echo "Unsupported version format in build.yaml: ${BASE_VERSION}"
            exit 1
          fi

          mkdir -p artifacts/package
          cp Jellyzer/bin/Release/net9.0/Jellyzer.dll artifacts/package/

          jq --arg version "${DEV_VERSION}" --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --arg sha "${SHORT_SHA}" \
            '.version = $version | .timestamp = $ts | .changelog = ("- Develop build " + $sha)' \
            Jellyzer/meta.json > artifacts/package/meta.json

          if [ -f Jellyzer/logo.png ]; then
            cp Jellyzer/logo.png artifacts/package/
          fi

          (cd artifacts/package && zip -r ../jellyzer-develop-latest.zip .)
          (cd artifacts && md5sum jellyzer-develop-latest.zip > jellyzer-develop-latest.md5)

          CHECKSUM="$(awk '{print $1}' artifacts/jellyzer-develop-latest.md5)"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          NAME="$(jq -r '.name' Jellyzer/meta.json)"
          GUID="$(jq -r '.guid' Jellyzer/meta.json | tr '[:lower:]' '[:upper:]')"
          OVERVIEW="$(jq -r '.overview' Jellyzer/meta.json)"
          DESCRIPTION="$(jq -r '.description' Jellyzer/meta.json)"
          OWNER="$(jq -r '.owner' Jellyzer/meta.json)"
          CATEGORY="$(jq -r '.category' Jellyzer/meta.json)"
          TARGET_ABI="$(jq -r '.targetAbi' Jellyzer/meta.json)"

          SOURCE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/refs/heads/develop/packages/jellyzer-develop-latest.zip"
          IMAGE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/refs/heads/develop/Jellyzer/logo.png"

          jq -n \
            --arg name "${NAME}" \
            --arg guid "${GUID}" \
            --arg overview "${OVERVIEW}" \
            --arg description "${DESCRIPTION}" \
            --arg owner "${OWNER}" \
            --arg category "${CATEGORY}" \
            --arg targetAbi "${TARGET_ABI}" \
            --arg version "${DEV_VERSION}" \
            --arg timestamp "${TIMESTAMP}" \
            --arg checksum "${CHECKSUM}" \
            --arg sourceUrl "${SOURCE_URL}" \
            --arg imageUrl "${IMAGE_URL}" \
            --arg changelog "Rolling develop build from ${GITHUB_SHA}" \
            '[{
              name: $name,
              guid: $guid,
              overview: $overview,
              description: $description,
              owner: $owner,
              category: $category,
              imageUrl: $imageUrl,
              versions: [{
                version: $version,
                targetAbi: $targetAbi,
                sourceUrl: $sourceUrl,
                checksum: $checksum,
                timestamp: $timestamp,
                changelog: $changelog
              }]
            }]' > repository-dev.json

      - name: Commit published develop artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p packages
          cp artifacts/jellyzer-develop-latest.zip packages/jellyzer-develop-latest.zip
          cp artifacts/jellyzer-develop-latest.md5 packages/jellyzer-develop-latest.md5

          git add repository-dev.json packages/jellyzer-develop-latest.zip packages/jellyzer-develop-latest.md5
          if ! git diff --cached --quiet; then
            git commit -m "ci: update repository-dev.json [skip ci]"
            git push origin HEAD:develop
          else
            echo "Develop files already up-to-date."
          fi
